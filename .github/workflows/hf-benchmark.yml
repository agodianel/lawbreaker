name: Run HuggingFace benchmarks

on:
  workflow_dispatch:   # Manual trigger only — these take a while

jobs:
  benchmark:
    runs-on: ubuntu-latest
    timeout-minutes: 360   # 6 hour safety limit

    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install huggingface_hub

      - name: Run HuggingFace benchmarks
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: python examples/run_huggingface.py

      - name: Upload results to HuggingFace
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: python examples/push_results.py

      - name: Commit new results to repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add examples/results_v0.6/huggingface/
          git diff --cached --quiet || git commit -m "Add HuggingFace benchmark results [CI]"
          git push
